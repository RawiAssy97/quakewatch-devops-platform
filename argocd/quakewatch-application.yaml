apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quakewatch-gitops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/RawiAssy97/quakewatch-devops-platform.git
    targetRevision: main
    path: helm/myquakewatch-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
